name: ci

on:
  pull_request:
  push:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --run

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.STAGING_SUPABASE_ANON_KEY }}

  migrate-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: checks
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations to staging
        run: supabase db push --db-url "$SUPABASE_DB_URL"
        env:
          SUPABASE_DB_URL: ${{ secrets.STAGING_DB_URL }}

  migrate-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: checks
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dry-run diff against production
        run: |
          supabase db diff --db-url "$SUPABASE_DB_URL" --schema public > /tmp/pending.sql || true
          echo "Pending drift (should describe only this release's migrations):"
          cat /tmp/pending.sql

      - name: Apply migrations to production
        run: supabase db push --db-url "$SUPABASE_DB_URL"
        env:
          SUPABASE_DB_URL: ${{ secrets.PROD_DB_URL }}

  smoke-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: migrate-production
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Netlify production deploy
        run: sleep 90

      - name: Health check
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PROD_APP_URL }}/api/v1/health")
          if [ "$status" != "200" ]; then
            echo "Health check failed with status $status"
            exit 1
          fi
