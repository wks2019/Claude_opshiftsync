<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOP Editor (React, Babel-standalone)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Playfair+Display:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600&family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;500;600&family=Manrope:wght@400;500;600&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>body { margin: 0; font-family: 'Inter', sans-serif; }</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState } = React;

// Same component logic as SopEditor.tsx, TypeScript types stripped for
// in-browser Babel compilation. SopEditor.tsx remains the source of truth,
// this file is a preview harness only, not a build artifact.

const FONT_OPTIONS = [
  { value: "'Fraunces', serif", label: 'Fraunces (Serif)' },
  { value: "'Playfair Display', serif", label: 'Playfair Display (Serif)' },
  { value: "'Cormorant Garamond', serif", label: 'Cormorant Garamond (Serif)' },
  { value: "'Libre Baskerville', serif", label: 'Libre Baskerville (Serif)' },
  { value: "'Inter', sans-serif", label: 'Inter (Sans-Serif)' },
  { value: "'Manrope', sans-serif", label: 'Manrope (Sans-Serif)' },
  { value: "'Work Sans', sans-serif", label: 'Work Sans (Sans-Serif)' },
  { value: "'IBM Plex Mono', monospace", label: 'Plex Mono (Mono)' },
];

const BLOCK_DEFINITIONS = [
  { type: 'procedure', label: 'Procedure', icon: '01' },
  { type: 'checklist', label: 'Checklist', icon: '☑' },
  { type: 'media', label: 'Media', icon: '▢' },
];

const createBlock = (type) => {
  const id = crypto.randomUUID();
  if (type === 'procedure') return { id, type, steps: [''] };
  if (type === 'checklist') return { id, type, items: [{ id: crypto.randomUUID(), text: '', checked: false }] };
  return { id, type: 'media', content: '', alt: '', caption: '' };
};

const initialSop = {
  title: 'Table Setup',
  standard: 'Tables must be set precisely to luxury standards to ensure guest comfort.',
  blocks: [
    { id: 'b1', type: 'procedure', steps: ['Place the charger plate centred.', 'Align the knife two centimetres from the edge.', 'Fold the napkin into a crisp triangle.'] },
  ],
};

const initialStyles = {
  title: { fontFamily: "'Fraunces', serif", fontSize: 28, textColor: '#1B1A17' },
  standard: { fontFamily: "'Fraunces', serif", fontSize: 15, textColor: '#1B1A17' },
  procedure: { fontFamily: "'Inter', sans-serif", fontSize: 14, textColor: '#1B1A17' },
  checklist: { fontFamily: "'Inter', sans-serif", fontSize: 14, textColor: '#1B1A17' },
};

function SopEditor() {
  const [sop, setSop] = useState(initialSop);
  const [selectedId, setSelectedId] = useState(null);
  const [styleTarget, setStyleTarget] = useState('title');
  const [styles, setStyles] = useState(initialStyles);

  const currentStyle = styles[styleTarget];
  const updateCurrentStyle = (patch) =>
    setStyles((prev) => ({ ...prev, [styleTarget]: { ...prev[styleTarget], ...patch } }));

  const addBlock = (type) =>
    setSop((prev) => ({ ...prev, blocks: [...prev.blocks, createBlock(type)] }));

  const updateBlock = (id, patch) => {
    setSop((prev) => ({
      ...prev,
      blocks: prev.blocks.map((b) => (b.id === id ? { ...b, ...patch } : b)),
    }));
  };

  const deleteBlock = (id) => {
    setSop((prev) => ({ ...prev, blocks: prev.blocks.filter((b) => b.id !== id) }));
    if (selectedId === id) setSelectedId(null);
  };

  const moveBlock = (id, direction) => {
    setSop((prev) => {
      const index = prev.blocks.findIndex((b) => b.id === id);
      const target = index + direction;
      if (target < 0 || target >= prev.blocks.length) return prev;
      const blocks = [...prev.blocks];
      [blocks[index], blocks[target]] = [blocks[target], blocks[index]];
      return { ...prev, blocks };
    });
  };

  const renderBlockEditor = (block) => {
    switch (block.type) {
      case 'procedure':
        return (
          <div className="space-y-2">
            {block.steps.map((step, i) => (
              <div key={i} className="flex gap-2">
                <span className="w-5 shrink-0 pt-2 font-mono text-xs text-amber-700">{String(i + 1).padStart(2, '0')}</span>
                <input
                  value={step}
                  onChange={(e) => {
                    const steps = [...block.steps];
                    steps[i] = e.target.value;
                    updateBlock(block.id, { steps });
                  }}
                  className="flex-1 rounded border border-stone-300 px-3 py-2 text-sm text-stone-900 focus:outline-none focus:border-amber-600"
                />
                <button
                  onClick={() => updateBlock(block.id, { steps: block.steps.filter((_, si) => si !== i) })}
                  className="px-2 text-stone-300 hover:text-red-500"
                  aria-label="Remove step"
                >
                  &times;
                </button>
              </div>
            ))}
            <button
              onClick={() => updateBlock(block.id, { steps: [...block.steps, ''] })}
              className="text-xs font-medium text-amber-700 hover:text-amber-800"
            >
              + Add step
            </button>
          </div>
        );

      case 'checklist':
        return (
          <div className="space-y-2">
            {block.items.map((item) => (
              <div key={item.id} className="flex items-center gap-2">
                <input
                  type="checkbox"
                  checked={item.checked}
                  onChange={(e) =>
                    updateBlock(block.id, {
                      items: block.items.map((it) => (it.id === item.id ? { ...it, checked: e.target.checked } : it)),
                    })
                  }
                  className="h-4 w-4 rounded border-stone-300 text-amber-700 focus:ring-amber-600"
                />
                <input
                  value={item.text}
                  onChange={(e) =>
                    updateBlock(block.id, {
                      items: block.items.map((it) => (it.id === item.id ? { ...it, text: e.target.value } : it)),
                    })
                  }
                  placeholder="Checklist item"
                  className="flex-1 rounded border border-stone-300 px-3 py-2 text-sm text-stone-900 focus:outline-none focus:border-amber-600"
                />
                <button
                  onClick={() => updateBlock(block.id, { items: block.items.filter((it) => it.id !== item.id) })}
                  className="px-2 text-stone-300 hover:text-red-500"
                  aria-label="Remove item"
                >
                  &times;
                </button>
              </div>
            ))}
            <button
              onClick={() =>
                updateBlock(block.id, { items: [...block.items, { id: crypto.randomUUID(), text: '', checked: false }] })
              }
              className="text-xs font-medium text-amber-700 hover:text-amber-800"
            >
              + Add item
            </button>
          </div>
        );

      case 'media':
        return (
          <div className="space-y-1.5">
            <input
              value={block.content}
              onChange={(e) => updateBlock(block.id, { content: e.target.value })}
              placeholder="Image URL"
              className="w-full rounded border border-stone-300 px-3 py-2 text-sm text-stone-900 focus:outline-none focus:border-amber-600"
            />
            <input
              value={block.alt}
              onChange={(e) => updateBlock(block.id, { alt: e.target.value })}
              placeholder="Alt text"
              className="w-full rounded border border-stone-300 px-3 py-2 text-sm text-stone-900 focus:outline-none focus:border-amber-600"
            />
            <input
              value={block.caption}
              onChange={(e) => updateBlock(block.id, { caption: e.target.value })}
              placeholder="Caption"
              className="w-full rounded border border-stone-300 px-3 py-2 text-sm text-stone-900 focus:outline-none focus:border-amber-600"
            />
          </div>
        );
      default:
        return null;
    }
  };

  const renderBlockPreview = (block) => {
    switch (block.type) {
      case 'procedure':
        return (
          <div key={block.id} className="mb-7">
            <div className="mb-3 text-xs uppercase tracking-widest text-amber-700">Procedure</div>
            <ol className="space-y-3" style={{ fontFamily: styles.procedure.fontFamily, fontSize: styles.procedure.fontSize, color: styles.procedure.textColor }}>
              {block.steps.filter((s) => s.trim()).map((step, i) => (
                <li key={i} className="flex gap-3" style={{ lineHeight: 1.55 }}>
                  <span className="shrink-0 pt-0.5 font-mono text-xs text-amber-700">{String(i + 1).padStart(2, '0')}</span>
                  <span>{step}</span>
                </li>
              ))}
            </ol>
          </div>
        );

      case 'checklist':
        return (
          <div key={block.id} className="mb-7">
            <div className="mb-3 text-xs uppercase tracking-widest text-amber-700">Checklist</div>
            <ul className="space-y-2" style={{ fontFamily: styles.checklist.fontFamily, fontSize: styles.checklist.fontSize, color: styles.checklist.textColor }}>
              {block.items.filter((it) => it.text.trim()).map((item) => (
                <li key={item.id} className={item.checked ? 'text-stone-400 line-through' : ''}>
                  {item.checked ? '☑' : '☐'} {item.text}
                </li>
              ))}
            </ul>
          </div>
        );

      case 'media':
        return block.content.trim() ? (
          <div key={block.id} className="mb-7 overflow-hidden rounded-sm border border-stone-200">
            <img src={block.content} alt={block.alt || 'SOP media'} className="block w-full" />
            {block.caption.trim() && (
              <div className="bg-white px-3.5 py-2.5 text-xs italic text-stone-500">{block.caption}</div>
            )}
          </div>
        ) : null;
      default:
        return null;
    }
  };

  return (
    <div className="flex h-screen flex-col bg-stone-100 md:flex-row">
      <div className="w-full shrink-0 overflow-y-auto border-b border-stone-200 bg-white px-8 py-10 md:w-[420px] md:border-b-0 md:border-r">
        <div className="mb-1 text-xs uppercase tracking-widest text-amber-700">SOP Editor</div>
        <h2 className="mb-8 font-serif text-2xl text-stone-900">Service Standard</h2>

        <div className="mb-8 space-y-4">
          <div>
            <label className="mb-1 block text-xs uppercase tracking-wide text-stone-500">Title</label>
            <input
              value={sop.title}
              onChange={(e) => setSop((prev) => ({ ...prev, title: e.target.value }))}
              className="w-full rounded border border-stone-300 px-3 py-2 text-sm text-stone-900 focus:outline-none focus:border-amber-600"
            />
          </div>
          <div>
            <label className="mb-1 block text-xs uppercase tracking-wide text-stone-500">Standard</label>
            <textarea
              value={sop.standard}
              onChange={(e) => setSop((prev) => ({ ...prev, standard: e.target.value }))}
              rows={4}
              className="w-full resize-y rounded border border-stone-300 px-3 py-2 text-sm text-stone-900 focus:outline-none focus:border-amber-600"
            />
          </div>
        </div>

        <div className="mb-8 space-y-3 border-t border-stone-200 pt-6">
          <div className="text-xs font-semibold uppercase tracking-wide text-stone-400">Style</div>
          <div>
            <label className="mb-1 block text-xs uppercase tracking-wide text-stone-500">Section</label>
            <select
              value={styleTarget}
              onChange={(e) => setStyleTarget(e.target.value)}
              className="w-full rounded border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:border-amber-600"
            >
              <option value="title">Title</option>
              <option value="standard">Standard</option>
              <option value="procedure">Procedure</option>
              <option value="checklist">Checklist</option>
            </select>
          </div>
          <div>
            <label className="mb-1 block text-xs uppercase tracking-wide text-stone-500">Font Family</label>
            <select
              value={currentStyle.fontFamily}
              onChange={(e) => updateCurrentStyle({ fontFamily: e.target.value })}
              className="w-full rounded border border-stone-300 px-3 py-2 text-sm focus:outline-none focus:border-amber-600"
            >
              {FONT_OPTIONS.map((f) => (
                <option key={f.value} value={f.value}>{f.label}</option>
              ))}
            </select>
          </div>
          <div>
            <label className="mb-1 block text-xs uppercase tracking-wide text-stone-500">Font Size ({currentStyle.fontSize}px)</label>
            <input
              type="range"
              min={12}
              max={36}
              value={currentStyle.fontSize}
              onChange={(e) => updateCurrentStyle({ fontSize: parseInt(e.target.value, 10) })}
              className="w-full accent-amber-700"
            />
          </div>
          <div>
            <label className="mb-1 block text-xs uppercase tracking-wide text-stone-500">Text Colour</label>
            <input
              type="color"
              value={currentStyle.textColor}
              onChange={(e) => updateCurrentStyle({ textColor: e.target.value })}
              className="h-8 w-12 cursor-pointer rounded border border-stone-300"
            />
          </div>
        </div>

        <div className="mb-4 text-xs font-semibold uppercase tracking-wide text-stone-400">Add Block</div>
        <div className="mb-8 space-y-1.5">
          {BLOCK_DEFINITIONS.map((def) => (
            <button
              key={def.type}
              onClick={() => addBlock(def.type)}
              className="flex w-full items-center gap-3 rounded-lg border border-stone-200 px-3 py-2.5 text-sm text-stone-700 transition-colors hover:border-amber-300 hover:bg-amber-50"
            >
              <span className="flex h-6 w-6 items-center justify-center rounded-md bg-stone-100 font-mono text-xs text-stone-500">
                {def.icon}
              </span>
              {def.label}
            </button>
          ))}
        </div>

        <div className="space-y-2">
          {sop.blocks.map((block, index) => (
            <div
              key={block.id}
              onClick={() => setSelectedId(block.id)}
              className={`group relative cursor-pointer rounded-lg border px-4 py-3 transition-colors ${
                selectedId === block.id ? 'border-amber-300 bg-amber-50/40 ring-1 ring-amber-200' : 'border-stone-200 hover:border-amber-200'
              }`}
            >
              <div className="pointer-events-none absolute -top-3 right-2 flex gap-1 rounded-md border border-stone-200 bg-white p-1 opacity-0 shadow-sm transition-opacity group-hover:pointer-events-auto group-hover:opacity-100">
                <button onClick={(e) => { e.stopPropagation(); moveBlock(block.id, -1); }} disabled={index === 0} className="px-1.5 text-xs text-stone-400 hover:text-stone-700 disabled:opacity-30" aria-label="Move up">↑</button>
                <button onClick={(e) => { e.stopPropagation(); moveBlock(block.id, 1); }} disabled={index === sop.blocks.length - 1} className="px-1.5 text-xs text-stone-400 hover:text-stone-700 disabled:opacity-30" aria-label="Move down">↓</button>
                <button onClick={(e) => { e.stopPropagation(); deleteBlock(block.id); }} className="px-1.5 text-xs text-stone-400 hover:text-red-500" aria-label="Delete block">&times;</button>
              </div>
              <div className="mb-2 text-xs uppercase tracking-wide text-stone-400">
                {BLOCK_DEFINITIONS.find((d) => d.type === block.type)?.label}
              </div>
              {renderBlockEditor(block)}
            </div>
          ))}
        </div>
      </div>

      <div className="flex-1 overflow-y-auto bg-stone-100 px-6 py-10 md:px-16 md:py-16">
        <div className="relative mx-auto max-w-xl rounded-lg bg-stone-50 px-8 py-10 shadow-xl md:px-12 md:py-14">
          <div className="absolute bottom-0 left-0 top-0 w-1 rounded-l-lg bg-amber-600" />

          <h1
            className="mb-7 border-b border-stone-200 pb-5 font-medium"
            style={{ fontFamily: styles.title.fontFamily, fontSize: styles.title.fontSize, color: styles.title.textColor, lineHeight: 1.15, letterSpacing: '-0.01em' }}
          >
            {sop.title || 'Untitled Standard'}
          </h1>

          <div className="mb-7">
            <div className="mb-2 text-xs uppercase tracking-widest text-amber-700">Standard</div>
            <p
              className="italic leading-relaxed"
              style={{ fontFamily: styles.standard.fontFamily, fontSize: styles.standard.fontSize, color: styles.standard.textColor }}
            >
              {sop.standard || 'No standard set.'}
            </p>
          </div>

          {sop.blocks.map(renderBlockPreview)}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SopEditor />);
</script>
</body>
</html>
